services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    restart: unless-stopped

  frontend:
    build: ./bubu-lagos-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
