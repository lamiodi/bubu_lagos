<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Deep forest green used in theme-color (#0f3d2e) -->
  <rect width="512" height="512" fill="#0f3d2e"/>
  
  <!-- Monogram text: B in gold/champagne color (#D4AF37) -->
  <text x="50%" y="54%" 
        font-family="Georgia, serif" 
        font-size="280" 
        font-weight="bold" 
        fill="#D4AF37" 
        dominant-baseline="middle" 
        text-anchor="middle"
        letter-spacing="0.05em">B</text>
  
  <!-- Subtle gold border -->
  <rect x="24" y="24" width="464" height="464" rx="20" fill="none" stroke="#D4AF37" stroke-width="12" opacity="0.8"/>
</svg>
